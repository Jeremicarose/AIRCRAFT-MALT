<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLAT Aircraft Tracker - Real-Time Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        .header {
            grid-column: 1 / -1;
            background: #16213e;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 24px;
            color: #00d9ff;
        }

        .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }

        .status-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d9ff;
        }

        .sidebar {
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid #0f3460;
        }

        .map-container {
            position: relative;
            background: #0f3460;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .aircraft-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #00d9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .aircraft-card:hover {
            background: #1a4d7a;
            transform: translateX(5px);
        }

        .aircraft-id {
            font-size: 16px;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 8px;
        }

        .aircraft-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #eee;
            font-weight: 500;
        }

        .receiver-markers {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            max-width: 250px;
        }

        .receiver-title {
            font-size: 14px;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .receiver-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 12px;
        }

        .receiver-item:last-child {
            border-bottom: none;
        }

        .online {
            color: #00ff88;
        }

        .offline {
            color: #ff4444;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .aircraft-icon {
            background: #00d9ff;
        }

        .receiver-icon {
            background: #ff6b6b;
        }

        .simulation-control {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 8px;
        }

        .btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }

        .btn-stop {
            background: #ff4444;
            color: white;
        }

        .btn-stop:hover {
            background: #cc0000;
        }

        .control-title {
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .control-input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px 10px;
            border-radius: 5px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #eee;
        }

        .control-status {
            font-size: 12px;
            color: #9fb7c9;
            margin-top: 6px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ MLAT Aircraft Tracker</h1>
            <div class="status">
                <div class="status-item">
                    <span class="status-label">Aircraft Tracked</span>
                    <span class="status-value" id="aircraft-count">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Active Receivers</span>
                    <span class="status-value" id="receiver-count">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Positions/min</span>
                    <span class="status-value" id="rate">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Avg Uncertainty</span>
                    <span class="status-value" id="avg-uncertainty">0m</span>
                </div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <h3 style="color: #00d9ff; margin-bottom: 15px;">Tracked Aircraft</h3>
            <div id="aircraft-list"></div>
        </div>

        <div class="map-container">
            <div id="map"></div>
            
            <div class="simulation-control">
                <h4 class="control-title">Live Connection</h4>
                <input id="api-url" class="control-input" type="text" />
                <button class="btn" onclick="connectLive()">▶ Connect</button>
                <button class="btn btn-stop" onclick="disconnectLive()">⏹ Disconnect</button>
                <button class="btn" onclick="refreshSnapshot()">↻ Refresh</button>
                <div class="control-status" id="connection-status">Disconnected</div>
            </div>

            <div class="receiver-markers">
                <div class="receiver-title">Receiver Network</div>
                <div id="receiver-list"></div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-icon aircraft-icon"></div>
                    <span>Aircraft</span>
                </div>
                <div class="legend-item">
                    <div class="legend-icon receiver-icon"></div>
                    <span>Receiver Station</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const map = L.map('map').setView([40.7128, -74.0060], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const aircraft = {};
        const receivers = {};
        const receiverMarkers = {};
        const aircraftMarkers = {};
        const aircraftPaths = {};
        let socket = null;
        let positionCount = 0;
        let startTime = Date.now();
        let lastBoundsFitAt = 0;
        let refreshTimer = null;

        const aircraftIcon = L.divIcon({
            className: 'custom-aircraft-icon',
            html: '<div style="background: #00d9ff; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white;"></div>',
            iconSize: [16, 16]
        });

        const receiverIcon = L.divIcon({
            className: 'custom-receiver-icon',
            html: '<div style="background: #ff6b6b; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white;"></div>',
            iconSize: [18, 18]
        });

        function defaultApiUrl() {
            const hostname = window.location.hostname || 'localhost';
            const protocol = window.location.protocol === 'https:' ? 'https' : 'http';
            return `${protocol}://${hostname}:5000`;
        }

        function getApiBase() {
            return document.getElementById('api-url').value.trim().replace(/\/$/, '');
        }

        function setStatus(message) {
            document.getElementById('connection-status').textContent = message;
        }

        async function fetchJson(path) {
            const response = await fetch(`${getApiBase()}${path}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} for ${path}`);
            }
            return response.json();
        }

        function parseCapabilities(raw) {
            if (Array.isArray(raw)) {
                return raw;
            }
            if (typeof raw === 'string') {
                try {
                    const parsed = JSON.parse(raw);
                    return Array.isArray(parsed) ? parsed : [raw];
                } catch (error) {
                    return [raw];
                }
            }
            return [];
        }

        function getAircraftPopup(ac) {
            return `
                <b>Aircraft ${ac.id}</b><br>
                Position: ${ac.lat.toFixed(4)}°, ${ac.lon.toFixed(4)}°<br>
                Altitude: ${Math.round(ac.alt)}m (${Math.round(ac.alt * 3.28084)}ft)<br>
                Receivers: ${ac.numReceivers || 0}<br>
                Uncertainty: ±${Math.round(ac.uncertainty)}m<br>
                Last update: ${new Date(ac.timestamp * 1000).toLocaleTimeString()}
            `;
        }

        function upsertReceiver(receiver) {
            receivers[receiver.receiver_id] = {
                id: receiver.receiver_id,
                name: receiver.receiver_id,
                lat: receiver.latitude,
                lon: receiver.longitude,
                alt: receiver.altitude,
                status: receiver.status,
                capabilities: parseCapabilities(receiver.capabilities),
                lastSeen: receiver.last_seen
            };

            const marker = receiverMarkers[receiver.receiver_id];
            const popup = `
                <b>${receiver.receiver_id}</b><br>
                Position: ${receiver.latitude.toFixed(4)}°, ${receiver.longitude.toFixed(4)}°<br>
                Altitude: ${Math.round(receiver.altitude)}m<br>
                Status: ${receiver.status}
            `;

            if (marker) {
                marker.setLatLng([receiver.latitude, receiver.longitude]);
                marker.setPopupContent(popup);
            } else {
                receiverMarkers[receiver.receiver_id] = L.marker(
                    [receiver.latitude, receiver.longitude],
                    { icon: receiverIcon }
                ).addTo(map).bindPopup(popup);
            }
        }

        function upsertAircraftFromApi(record) {
            const aircraftId = record.aircraft_id;
            const lat = record.position ? record.position.latitude : record.latitude;
            const lon = record.position ? record.position.longitude : record.longitude;
            const alt = record.position ? record.position.altitude : record.altitude;

            if (typeof lat !== 'number' || typeof lon !== 'number') {
                return;
            }

            if (!aircraft[aircraftId]) {
                aircraft[aircraftId] = {
                    id: aircraftId,
                    lat,
                    lon,
                    alt: alt || 0,
                    uncertainty: record.uncertainty || 0,
                    numReceivers: record.num_receivers || 0,
                    timestamp: record.timestamp || Date.now() / 1000,
                    positions: []
                };
            }

            const ac = aircraft[aircraftId];
            ac.lat = lat;
            ac.lon = lon;
            ac.alt = alt || 0;
            ac.uncertainty = record.uncertainty || 0;
            ac.numReceivers = record.num_receivers || 0;
            ac.timestamp = record.timestamp || Date.now() / 1000;
            ac.positions.push({ lat, lon, time: ac.timestamp });

            if (ac.positions.length > 50) {
                ac.positions = ac.positions.slice(-50);
            }

            if (!aircraftMarkers[aircraftId]) {
                aircraftMarkers[aircraftId] = L.marker([lat, lon], { icon: aircraftIcon })
                    .addTo(map)
                    .bindPopup(getAircraftPopup(ac));
            } else {
                aircraftMarkers[aircraftId].setLatLng([lat, lon]);
                aircraftMarkers[aircraftId].setPopupContent(getAircraftPopup(ac));
            }

            if (!aircraftPaths[aircraftId]) {
                aircraftPaths[aircraftId] = L.polyline([], {
                    color: '#00d9ff',
                    weight: 2,
                    opacity: 0.5
                }).addTo(map);
            }
            aircraftPaths[aircraftId].setLatLngs(ac.positions.map((point) => [point.lat, point.lon]));

            positionCount += 1;
        }

        function clearAircraftState() {
            Object.values(aircraftMarkers).forEach((marker) => map.removeLayer(marker));
            Object.values(aircraftPaths).forEach((path) => map.removeLayer(path));
            Object.keys(aircraft).forEach((key) => delete aircraft[key]);
            Object.keys(aircraftMarkers).forEach((key) => delete aircraftMarkers[key]);
            Object.keys(aircraftPaths).forEach((key) => delete aircraftPaths[key]);
            positionCount = 0;
            startTime = Date.now();
        }

        function maybeFitMap() {
            const now = Date.now();
            if (now - lastBoundsFitAt < 10000) {
                return;
            }

            const points = Object.values(aircraft).map((ac) => [ac.lat, ac.lon]);
            if (points.length === 0) {
                return;
            }

            lastBoundsFitAt = now;
            map.fitBounds(points, { padding: [40, 40], maxZoom: 9 });
        }

        function updateReceiverList() {
            const receiverList = Object.values(receivers);
            const list = document.getElementById('receiver-list');
            list.innerHTML = receiverList.map((recv) => `
                <div class="receiver-item">
                    <span>${recv.name}</span>
                    <span class="${recv.status === 'online' ? 'online' : 'offline'}">● ${recv.status}</span>
                </div>
            `).join('');
            document.getElementById('receiver-count').textContent = receiverList.length;
        }

        function updateUI() {
            const aircraftList = Object.values(aircraft).sort((a, b) => b.timestamp - a.timestamp);
            document.getElementById('aircraft-count').textContent = aircraftList.length;

            const elapsed = (Date.now() - startTime) / 1000 / 60;
            const rate = elapsed > 0 ? Math.round(positionCount / elapsed) : 0;
            document.getElementById('rate').textContent = rate;

            const avgUncertainty = aircraftList.length > 0
                ? Math.round(aircraftList.reduce((sum, ac) => sum + ac.uncertainty, 0) / aircraftList.length)
                : 0;
            document.getElementById('avg-uncertainty').textContent = `${avgUncertainty}m`;

            const list = document.getElementById('aircraft-list');
            list.innerHTML = aircraftList.map((ac) => `
                <div class="aircraft-card" onclick="focusAircraft('${ac.id}')">
                    <div class="aircraft-id">${ac.id}</div>
                    <div class="aircraft-info">
                        <span class="info-label">Altitude:</span>
                        <span class="info-value">${Math.round(ac.alt)}m</span>
                        <span class="info-label">Receivers:</span>
                        <span class="info-value">${ac.numReceivers}</span>
                        <span class="info-label">Uncertainty:</span>
                        <span class="info-value">±${Math.round(ac.uncertainty)}m</span>
                        <span class="info-label">Updated:</span>
                        <span class="info-value">${new Date(ac.timestamp * 1000).toLocaleTimeString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function focusAircraft(id) {
            const ac = aircraft[id];
            if (ac) {
                map.setView([ac.lat, ac.lon], 10);
                aircraftMarkers[id].openPopup();
            }
        }

        async function loadReceivers() {
            try {
                const data = await fetchJson('/api/receivers');
                Object.values(receiverMarkers).forEach((marker) => map.removeLayer(marker));
                Object.keys(receiverMarkers).forEach((key) => delete receiverMarkers[key]);
                Object.keys(receivers).forEach((key) => delete receivers[key]);

                data.receivers.forEach(upsertReceiver);
                updateReceiverList();
            } catch (error) {
                console.error('Failed to load receivers', error);
                setStatus(`Receiver load failed: ${error.message}`);
            }
        }

        async function loadPositions() {
            clearAircraftState();
            const data = await fetchJson('/api/positions/recent?seconds=600&limit=500');
            const orderedPositions = [...data.positions].sort((a, b) => a.timestamp - b.timestamp);
            orderedPositions.forEach(upsertAircraftFromApi);
            updateUI();
            maybeFitMap();
        }

        async function loadStatistics() {
            try {
                const data = await fetchJson('/api/statistics?hours=1');
                const current = data.current || {};
                if (typeof current.active_aircraft === 'number') {
                    document.getElementById('aircraft-count').textContent = current.active_aircraft;
                }
            } catch (error) {
                console.error('Failed to load statistics', error);
            }
        }

        async function refreshSnapshot() {
            setStatus('Refreshing snapshot...');
            try {
                await Promise.all([
                    loadReceivers(),
                    loadPositions(),
                    loadStatistics()
                ]);
                setStatus(`Snapshot refreshed from ${getApiBase()}`);
            } catch (error) {
                setStatus(`Refresh failed: ${error.message}`);
            }
        }

        function disconnectLive() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
            setStatus('Disconnected');
        }

        async function connectLive() {
            disconnectLive();
            setStatus('Connecting...');

            try {
                await refreshSnapshot();
            } catch (error) {
                console.error(error);
            }

            socket = io(getApiBase(), {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                setStatus(`Connected to ${getApiBase()}`);
            });

            socket.on('disconnect', () => {
                setStatus('Disconnected');
            });

            socket.on('connect_error', (error) => {
                setStatus(`Socket error: ${error.message}`);
            });

            socket.on('position_update', (payload) => {
                if (!payload || !payload.aircraft_id || !payload.position) {
                    return;
                }

                upsertAircraftFromApi({
                    aircraft_id: payload.aircraft_id,
                    ...payload.position
                });
                updateUI();
            });

            refreshTimer = setInterval(() => {
                refreshSnapshot().catch((error) => {
                    console.error('Background refresh failed', error);
                });
            }, 15000);
        }

        document.getElementById('api-url').value = defaultApiUrl();
        updateUI();
        updateReceiverList();
        connectLive();
    </script>
</body>
</html>
